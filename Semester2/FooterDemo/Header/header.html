<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>header</title>

    <style>
      /* Mobile First Design*/
      body {
        margin: 0;
        padding: 0;
      }
      #pageheader {
        background-color: antiquewhite;
      }

      #logo {
        width: 100px;
        height: 100px;
        background-color: rgb(rgb(214, 171, 0));
        border-radius: 50%;
        border: 2px solid brown;
        margin: auto;
        margin-top: 1rem;
      }
      #pageheader nav {
        background-color: rgb(rgba(255, 222, 37, 0.984));
      }
    </style>
  </head>
  <body>
    <header id="pageheader">
      <div id="logo">
        <nav>
          <ul>
            <li>Home</li>
            <li>Why Adopt</li>
            <li>Pet Gallery</li>
            <li>Testimonials</li>
          </ul>
        </nav>
      </div>
    </header>
  </body>
</html>
